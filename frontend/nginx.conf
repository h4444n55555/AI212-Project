server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # For React Router / Vite support (Single Page Application routing fallback)
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls directly to the Docker backend container running on port 8000
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
